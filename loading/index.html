<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>bolchal - Loading</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
</head>
<body>
  <!-- Background Bokeh Elements -->
  <div class="background">
    <div class="bokeh bokeh-1"></div>
    <div class="bokeh bokeh-2"></div>
    <div class="bokeh bokeh-3"></div>
    <div class="gradient-overlay"></div>
  </div>

  <!-- Main Content -->
  <main class="container">
    <!-- Logo Section -->
    <div class="logo-section">
      <div class="logo-pulse">
        <div class="logo-glow"></div>
        <svg class="play-icon" viewBox="0 0 24 24" width="128" height="128">
          <circle cx="12" cy="12" r="11" fill="none" stroke="currentColor" stroke-width="1"/>
          <polygon points="10,8 10,16 16,12" fill="currentColor"/>
        </svg>
      </div>
      <h1 class="brand-text">bolchal</h1>
    </div>

    <!-- Loading Feedback -->
    <div class="loading-section">
      <div class="progress-bar">
        <div class="shimmer"></div>
      </div>
      <p class="loading-text">preparing your bolchal experience...</p>
      <div class="bounce-dots">
        <span class="dot dot-1"></span>
        <span class="dot dot-2"></span>
        <span class="dot dot-3"></span>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>Powered by Aether-Node Engine</p>
  </footer>

  <!-- Corner Decorations -->
  <div class="corner corner-tl"></div>
  <div class="corner corner-br"></div>

  <script src="script.js"></script>
</body>
</html>
